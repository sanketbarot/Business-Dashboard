<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 - Page Not Found | AI Toolcor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0a0e27;
  color: #fff;
  overflow: hidden;
  position: relative;
  padding: 20px;
}

body::before {
  content: '';
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, transparent 70%);
  top: -200px; left: -200px;
  border-radius: 50%;
}

body::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(251,191,36,0.1) 0%, transparent 70%);
  bottom: -150px; right: -150px;
  border-radius: 50%;
}

.box {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 480px;
}

.code {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 8rem;
  font-weight: 700;
  line-height: 1;
  background: linear-gradient(135deg, #06b6d4 0%, #fbbf24 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
}

.title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 1.75rem;
  font-weight: 700;
  margin-bottom: 12px;
}

.desc {
  color: #94a3b8;
  font-size: 1rem;
  line-height: 1.6;
  margin-bottom: 32px;
}

.btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 12px 22px;
  border-radius: 12px;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  border: none;
}

.btn-primary {
  background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
  color: #fff;
  box-shadow: 0 8px 24px rgba(6,182,212,0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(6,182,212,0.4);
}

.btn-ghost {
  background: rgba(255,255,255,0.05);
  color: #cbd5e1;
  border: 1.5px solid rgba(255,255,255,0.1);
}

.btn-ghost:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.2);
}

.brand {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.75rem;
  color: #06b6d4;
  font-weight: 700;
  font-family: 'Space Grotesk', sans-serif;
  z-index: 2;
}

@media (max-width: 600px) {
  .code { font-size: 5rem; }
  .title { font-size: 1.3rem; }
  .desc { font-size: 0.88rem; }
}
</style>
</head>
<body>

<div class="box">
  <div class="code">404</div>
  <div class="title">Page Not Found</div>
  <div class="desc">Oops! The page you're looking for doesn't exist or has been moved. Let's get you back on track.</div>
  <div class="btns">
    <a href="/index.html" class="btn btn-primary">🏠 Go to Dashboard</a>
    <a href="/login.html" class="btn btn-ghost">🔐 Login</a>
  </div>
</div>

<div class="brand">business.aitoolcor.com</div>

</body>
</html>
